<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="sbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07060d"/>
      <stop offset="50%" style="stop-color:#12101c"/>
      <stop offset="100%" style="stop-color:#0a0814"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="55%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#sbg)"/>
  <circle cx="200" cy="80" r="200" fill="#6366f1" fill-opacity="0.12"/>
  <circle cx="1100" cy="120" r="180" fill="#ec4899" fill-opacity="0.1"/>
  <rect x="0" y="0" width="1280" height="64" fill="rgba(7,6,13,0.65)"/>
  <rect x="40" y="16" width="40" height="40" rx="12" fill="url(#brand)"/>
  <text x="96" y="36" fill="#f4f2ff" font-family="system-ui,sans-serif" font-size="17" font-weight="700">OpenClaw Studio</text>
  <text x="96" y="52" fill="#9c96b8" font-family="system-ui,sans-serif" font-size="11">Workflow edition - same JSON engine</text>
  <text x="1020" y="42" fill="#c4b5fd" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Classic workspace</text>
  <text x="640" y="130" text-anchor="middle" fill="#e8e4ff" font-family="system-ui,sans-serif" font-size="36" font-weight="800">Shape your gateway in guided beats</text>
  <text x="640" y="170" text-anchor="middle" fill="#9c96b8" font-family="system-ui,sans-serif" font-size="15">Connect - Sync - Channels - Plugins - Agents - Blueprint - Ship</text>
  <g transform="translate(120,200)">
    <rect width="100" height="36" rx="18" fill="rgba(168,85,247,0.35)" stroke="rgba(168,85,247,0.55)"/>
    <text x="28" y="24" fill="#ffffff" font-family="system-ui,sans-serif" font-size="12" font-weight="600">1 Connect</text>
    <rect x="115" width="72" height="36" rx="18" fill="rgba(255,255,255,0.06)"/>
    <text x="135" y="24" fill="#9c96b8" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Sync</text>
    <rect x="202" width="92" height="36" rx="18" fill="rgba(255,255,255,0.06)"/>
    <text x="218" y="24" fill="#9c96b8" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Channels</text>
    <rect x="309" width="82" height="36" rx="18" fill="rgba(255,255,255,0.06)"/>
    <text x="322" y="24" fill="#9c96b8" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Plugins</text>
    <rect x="406" width="78" height="36" rx="18" fill="rgba(255,255,255,0.06)"/>
    <text x="420" y="24" fill="#9c96b8" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Agents</text>
    <rect x="499" width="96" height="36" rx="18" fill="rgba(255,255,255,0.06)"/>
    <text x="512" y="24" fill="#9c96b8" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Blueprint</text>
    <rect x="610" width="70" height="36" rx="18" fill="rgba(255,255,255,0.06)"/>
    <text x="628" y="24" fill="#9c96b8" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Ship</text>
  </g>
  <rect x="120" y="280" width="1040" height="280" rx="18" fill="rgba(24,22,38,0.72)" stroke="rgba(255,255,255,0.1)"/>
  <text x="160" y="330" fill="#f4f2ff" font-family="system-ui,sans-serif" font-size="20" font-weight="700">Connect</text>
  <text x="160" y="358" fill="#9c96b8" font-family="system-ui,sans-serif" font-size="14">Gateway and file: point the studio at your Control UI and config path.</text>
  <rect x="160" y="390" width="480" height="36" rx="12" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.1)"/>
  <text x="176" y="414" fill="#e9e4ff" font-family="monospace,sans-serif" font-size="13">http://127.0.0.1:18789</text>
  <rect x="160" y="440" width="800" height="36" rx="12" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.1)"/>
  <text x="176" y="464" fill="#e9e4ff" font-family="monospace,sans-serif" font-size="13">~/.openclaw/openclaw.json</text>
  <rect x="160" y="500" width="100" height="40" rx="12" fill="url(#brand)"/>
  <text x="188" y="526" fill="#ffffff" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Next</text>
  <text x="48" y="695" fill="#5a5570" font-family="system-ui,sans-serif" font-size="12">Vector preview - Workflow studio (/studio)</text>
</svg>
