      <stop offset="0%" style="stop-color:#0c0f14"/>
      <stop offset="100%" style="stop-color:#0e1219"/>
    </linearGradient>
    <linearGradient id="btn" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4aa8ff"/>
      <stop offset="100%" style="stop-color:#2568b8"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#cbg)"/>
  <text x="48" y="52" fill="#e8edf5" font-family="system-ui,sans-serif" font-size="26" font-weight="600">OpenClaw configuration</text>
  <rect x="48" y="58" width="110" height="20" rx="6" fill="rgba(61,159,255,0.18)" stroke="rgba(61,159,255,0.35)"/>
  <text x="56" y="73" fill="#b8dcff" font-family="system-ui,sans-serif" font-size="9" font-weight="700">CLASSIC</text>
  <text x="170" y="72" fill="#8b9cb3" font-family="system-ui,sans-serif" font-size="14">Edit openclaw.json (JSON5) with validation</text>
  <text x="980" y="48" fill="#3d9fff" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Switch to workflow studio</text>
  <rect x="48" y="95" width="1184" height="120" rx="10" fill="#161d2a" stroke="#243044"/>
