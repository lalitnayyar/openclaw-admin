  <rect x="48" y="340" width="1184" height="280" rx="10" fill="#121822" stroke="#243044"/>
  <text x="72" y="380" fill="#9fd0ff" font-family="ui-monospace,monospace" font-size="12">{</text>
  <text x="88" y="405" fill="#9fd0ff" font-family="ui-monospace,monospace" font-size="12">&quot;agents&quot;: { &quot;defaults&quot;: { ... } },</text>
  <text x="88" y="430" fill="#9fd0ff" font-family="ui-monospace,monospace" font-size="12">&quot;channels&quot;: { ... },</text>
  <text x="88" y="455" fill="#9fd0ff" font-family="ui-monospace,monospace" font-size="12">&quot;plugins&quot;: { &quot;enabled&quot;: true }</text>
  <text x="72" y="480" fill="#9fd0ff" font-family="ui-monospace,monospace" font-size="12">}</text>
  <text x="48" y="680" fill="#5a6578" font-family="system-ui,sans-serif" font-size="12">Vector preview - Classic workspace (/classic)</text>
