  <rect x="72" y="140" width="520" height="32" rx="8" fill="#121822" stroke="#243044"/>
  <text x="84" y="161" fill="#e8edf5" font-family="monospace,sans-serif" font-size="13">http://127.0.0.1:18789</text>
  <text x="640" y="130" fill="#8b9cb3" font-family="system-ui,sans-serif" font-size="11" font-weight="600">OPENCLAW.JSON PATH</text>
  <rect x="640" y="140" width="520" height="32" rx="8" fill="#121822" stroke="#243044"/>
  <text x="652" y="161" fill="#e8edf5" font-family="monospace,sans-serif" font-size="13">~/.openclaw/openclaw.json</text>
  <rect x="72" y="185" width="130" height="28" rx="8" fill="#121822" stroke="#243044"/>
  <text x="95" y="204" fill="#e8edf5" font-family="system-ui,sans-serif" font-size="12">Reload file</text>
  <rect x="48" y="235" width="90" height="34" rx="8" fill="url(#btn)"/>
  <text x="70" y="257" fill="#ffffff" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Validate</text>
  <rect x="150" y="235" width="90" height="34" rx="8" fill="url(#btn)"/>
  <text x="165" y="257" fill="#ffffff" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Save</text>
  <g transform="translate(48,290)">
    <rect width="90" height="32" rx="8" fill="#161d2a" stroke="#243044"/>
    <text x="20" y="22" fill="#e8edf5" font-family="system-ui,sans-serif" font-size="13">Raw JSON5</text>
    <rect x="98" width="72" height="32" rx="8" fill="transparent"/>
    <text x="108" y="22" fill="#8b9cb3" font-family="system-ui,sans-serif" font-size="13">Browse</text>
    <rect x="186" width="88" height="32" rx="8" fill="transparent"/>
    <text x="196" y="22" fill="#8b9cb3" font-family="system-ui,sans-serif" font-size="13">Channels</text>
    <rect x="290" width="78" height="32" rx="8" fill="transparent"/>
    <text x="300" y="22" fill="#8b9cb3" font-family="system-ui,sans-serif" font-size="13">Plugins</text>
    <rect x="384" width="118" height="32" rx="8" fill="transparent"/>
    <text x="394" y="22" fill="#8b9cb3" font-family="system-ui,sans-serif" font-size="13">Agents &amp; tools</text>
